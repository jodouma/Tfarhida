<!doctype html>
<html lang="tn">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f97316" />
    <meta name="description" content="Tfarhida - mini-jeux sociaux tunisiens" />
    <title>Tfarhida | Mini-jeux sociaux tunisiens</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var isPages = window.location.hostname.endsWith("github.io");
        var base = isPages ? "/Tfarhida/" : "/";

        if (isPages) {
          var css = document.createElement("link");
          css.rel = "stylesheet";
          css.href = base + "assets/app.css";
          document.head.appendChild(css);
        }

        var script = document.createElement("script");
        script.type = "module";
        script.src = isPages ? base + "assets/app.js" : "/" + "src" + "/main.tsx";
        document.body.appendChild(script);
      })();
    </script>
  </body>
</html>
